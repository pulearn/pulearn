name: Benchmark Smoke

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --only-binary=all numpy pandas scikit-learn
          python -m pip install -e . -r tests/requirements.txt

      - name: Run benchmark smoke tests
        run: |
          python -m pytest tests/test_benchmark_datasets.py \
                           tests/test_benchmark_runner.py \
                           tests/test_benchmark_smoke_gate.py \
                           -v --no-cov

      - name: Run quick benchmark report (smoke)
        run: |
          python - <<'EOF'
          import sys
          from sklearn.linear_model import LogisticRegression
          from pulearn import ElkanotoPuClassifier
          from pulearn.benchmarks import BenchmarkRunner

          def build_elkanoto():
              return ElkanotoPuClassifier(
                  estimator=LogisticRegression(max_iter=200, random_state=0),
                  hold_out_ratio=0.1,
                  random_state=0,
              )

          runner = BenchmarkRunner(random_state=42)
          runner.run(
              estimator_builders={"elkanoto": build_elkanoto},
              n_samples=300,
              pi=0.3,
              c=0.5,
          )
          md = runner.to_markdown()
          print(md)
          runner.to_csv("benchmark_smoke_results.csv")
          results = runner.results
          assert len(results) == 1, "Expected exactly one benchmark result"
          r = results[0]
          assert r.error is None, f"Benchmark error: {r.error}"
          assert r.f1 >= 0.0, "F1 must be non-negative"
          # Write a job summary so failures are easy to locate
          import os
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary_path:
              with open(summary_path, "a") as fh:
                  fh.write("## Benchmark Smoke Results\n\n")
                  fh.write(md + "\n\n")
                  fh.write(
                      "> **Artifact:** download `benchmark-smoke-results` "
                      "from this run for the raw CSV.\n"
                  )
          print("Smoke benchmark PASSED", file=sys.stderr)
          EOF

      - name: Upload smoke benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-smoke-results
          path: benchmark_smoke_results.csv
          if-no-files-found: ignore
