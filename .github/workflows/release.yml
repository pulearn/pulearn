name: PyPI Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install -U build twine
      - name: Build package
        run: python -m build
      - name: List package
        run: ls -lh dist/
      - name: Check package
        run: twine check dist/*

      - name: Upload dist artifact for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: pulearn_dist
          path: dist

  install:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: pulearn_dist
          path: dist
      - name: Install package
        working-directory: dist
        run: pip install $(ls *.whl)
      - name: Try importing the package
        run: python -c "import pulearn"

  publish:
    needs: [build, install]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    outputs:
      should_publish: ${{ steps.release_guard.outputs.should_publish }}
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi_publish
      url: https://pypi.org/project/pulearn/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Determine whether this push is a release commit
        id: release_guard
        run: |
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import tomllib

          current_version = tomllib.loads(
              pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]

          previous_pyproject = subprocess.run(
              ["git", "show", "HEAD^:pyproject.toml"],
              check=False,
              capture_output=True,
              text=True,
          )
          if previous_pyproject.returncode == 0:
              previous_version = tomllib.loads(previous_pyproject.stdout)["project"]["version"]
          else:
              previous_version = None

          should_publish = previous_version != current_version
          output_file = pathlib.Path(os.environ.get("RUNNER_TEMP", "/tmp")) / "release_outputs.txt"
          with output_file.open("w", encoding="utf-8") as f:
              f.write(f"should_publish={'true' if should_publish else 'false'}\n")
              f.write(f"version={current_version}\n")

          print(
              "Release decision:",
              {
                  "should_publish": should_publish,
                  "current_version": current_version,
                  "previous_version": previous_version,
              },
          )
          PY
          cat "$RUNNER_TEMP/release_outputs.txt" >> "$GITHUB_OUTPUT"
      - name: Skip publish (no version change)
        if: steps.release_guard.outputs.should_publish != 'true'
        run: echo "No pyproject version change detected; skipping publish."
      - name: Download dist artifact
        if: steps.release_guard.outputs.should_publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: pulearn_dist
          path: dist
      - name: Publish distribution 📦 to PyPI
        if: steps.release_guard.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
