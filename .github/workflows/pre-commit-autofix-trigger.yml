name: pre-commit.ci autofix trigger

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write
  checks: read
  statuses: read
  contents: read

jobs:
  trigger:
    if: >-
      github.event.pull_request.user.type == 'Bot' ||
      endsWith(github.actor, '[bot]')
    uses: shaypal5/pre-commit-ci-autofix-trigger/.github/workflows/reusable-autofix-trigger.yml@55d00aabf564759e154b637eb5db981ff1994dd7
    with:
      pr_number: ${{ github.event.pull_request.number }}
